## Kubetail Cluster Agent Configuration File
#
# This file defines the behavior for the kubetail cluster agent,
# which runs in Kubernetes clusters to stream and process container logs.
#

## addr ##
#
# The network address and port the gRPC server should bind to.
#
# Default value: :50051
#
addr: :50051

## container-logs-dir ##
#
# The directory path where Kubernetes stores container log files.
# This is typically a mount from the host node's filesystem.
#
# Default value: /var/log/containers
#
container-logs-dir: /var/log/containers

## logging ##
#
# Configuration for the agent's logging output
#
logging:

  ## enabled ##
  #
  # Whether logging is enabled for the agent.
  #
  # Default value: true
  #
  enabled: true

  ## level ##
  #
  # The minimum log level to output.
  # Valid values: debug, info, warn, error
  #
  # Default value: info
  #
  level: info

  ## format ##
  #
  # The format of log output.
  # Valid values: json, text
  #
  # Default value: json
  #
  format: json

## tls ##
#
# TLS configuration for secure gRPC connections. TLS is mandatory; the listener
# requires and verifies a client cert chained to `ca-file`.
#
tls:

  ## cert-file ##
  #
  # Path to the TLS certificate file. Required.
  #
  cert-file: ""

  ## key-file ##
  #
  # Path to the TLS private key file. Required.
  #
  key-file: ""

  ## ca-file ##
  #
  # Path to the CA certificate file used to verify client certs. Required.
  #
  ca-file: ""

  ## allowed-names ##
  #
  # Allowlist of peer-certificate Common Names whose forwarded identity
  # headers (x-remote-user, x-remote-group, x-remote-extra-*) the agent
  # will trust. The TLS layer accepts any cert signed by the configured CA;
  # this list narrows that to the specific clients authorized to assert
  # identity on behalf of end users (e.g. the cluster-api).
  #
  # An empty list accepts any verified peer CN, matching kube-apiserver's
  # `requestheader-allowed-names` semantics. When the CA is shared with
  # other workloads, populate this list with the cluster-api Service CN.
  #
  # Default value: []
  #
  allowed-names: []
